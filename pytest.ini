[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show full diff on assertion failure
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Markers
markers =
    unit: Pure unit tests — no DB, no HTTP
    integration: Full app integration tests (requires FastAPI + SQLite)
    slow: Tests that take > 5 seconds

# Async support
asyncio_mode = auto
